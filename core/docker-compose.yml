version: "3.9"

networks:
  fl-network:
    name: fl-network
    driver: bridge

services:
  fl-server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: fl-server
    ports:
      - "${FL_SERVER_PORT:-8080}:8080"
    volumes:
      - ../output:/output
      - ./config/config.yaml:/app/config/config.yaml:ro
    env_file:
      - ../.env
    networks:
      - fl-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
