server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Allow large dataset uploads (default is 1 MB)
    client_max_body_size 50m;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api/* → controller (strips /api prefix)
    location /api/ {
        resolver 127.0.0.11 valid=30s;
        set $upstream http://fl-controller:8080;
        rewrite ^/api/(.*) /$1 break;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
        client_max_body_size 50m;
    }
}
