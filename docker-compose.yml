services:

  # ── Zookeeper (Kafka coordination) ─────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: fl-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      KAFKA_OPTS: "-Dzookeeper.4lw.commands.whitelist=*"
    healthcheck:
      test: ["CMD", "bash", "-c", "echo srvr | nc localhost 2181 | grep -q Mode"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Kafka broker ───────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: fl-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"       # host access for local testing
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 24
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:29092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ── Kafka topic initialiser (runs once, exits) ─────────────────────────────
  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: fl-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic client.weights  --partitions 4 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic global.weights  --partitions 1 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic fl.metrics      --partitions 1 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic fl.status       --partitions 1 --replication-factor 1
        echo "Topics created."
    restart: "no"

  # ── Kafka UI ───────────────────────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: fl-kafka-ui
    ports:
      - "8090:8080"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: fl-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181

  # ── HDFS NameNode ──────────────────────────────────────────────────────────
  hdfs-namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: fl-hdfs-namenode
    ports:
      - "9870:9870"     # WebHDFS + web UI
      - "9000:9000"     # HDFS RPC
    environment:
      CLUSTER_NAME: fl-cluster
      CORE_CONF_fs_defaultFS: hdfs://hdfs-namenode:9000
      HDFS_CONF_dfs_replication: 1
      HDFS_CONF_dfs_namenode_datanode_registration_ip___hostname___check: "false"
    volumes:
      - hdfs-namenode-data:/hadoop/dfs/name
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9870/"]
      interval: 20s
      timeout: 10s
      retries: 10

  # ── HDFS DataNode ──────────────────────────────────────────────────────────
  hdfs-datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: fl-hdfs-datanode
    depends_on:
      hdfs-namenode:
        condition: service_healthy
    environment:
      SERVICE_PRECONDITION: "hdfs-namenode:9870"
      CORE_CONF_fs_defaultFS: hdfs://hdfs-namenode:9000
      HDFS_CONF_dfs_replication: 1
    volumes:
      - hdfs-datanode-data:/hadoop/dfs/data

  # ── Worker (Kafka consumer + HDFS + aggregation) ──────────────────────────
  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    container_name: fl-worker
    depends_on:
      kafka:
        condition: service_healthy
      hdfs-namenode:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP: kafka:29092
      HDFS_URL: http://hdfs-namenode:9870
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./worker:/app/worker          # live-reload during dev
      - ./fl/shared:/app/fl/shared
    restart: unless-stopped

  # ── Dashboard (React + Nginx) ─────────────────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
      args:
        VITE_API_URL: /api    # Nginx proxies /api/* → controller:8080/*
    container_name: fl-dashboard
    ports:
      - "3000:80"
    depends_on:
      - controller
    restart: unless-stopped

  # ── Controller (FastAPI orchestration) ────────────────────────────────────
  controller:
    build:
      context: .
      dockerfile: controller/Dockerfile
    container_name: fl-controller
    ports:
      - "8080:8080"
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./fl/data:/app/fl/data
      - ./fl/output:/app/fl/output
      - ./controller/app/clients:/app/controller/app/clients
      - ./controller/app/experiments.db:/app/controller/app/experiments.db
      - ./scripts:/app/scripts
      - ./fl/shared:/app/fl/shared
      - ./fl/client:/app/fl/client
      - ./fl/server:/app/fl/server
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: "1"
      KAFKA_BOOTSTRAP: kafka:29092
    restart: unless-stopped

volumes:
  hdfs-namenode-data:
  hdfs-datanode-data:
