server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ── React SPA ─────────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Controller API proxy ──────────────────────────────────────────────────
    # All /api/* requests are forwarded to the controller with the /api prefix stripped.
    # e.g.  /api/clients → controller:8080/clients
    #        /api/training/kafka-stream → controller:8080/training/kafka-stream
    #
    # resolver + $upstream variable: Nginx resolves fl-controller lazily at
    # request time instead of at startup, so the container starts even if the
    # controller isn't up yet (or in standalone test mode).
    resolver 127.0.0.11 valid=10s ipv6=off;

    location /api/ {
        set $upstream http://fl-controller:8080;
        rewrite ^/api/(.*) /$1 break;
        proxy_pass         $upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

        # SSE / long-polling: disable buffering so events reach the browser instantly
        proxy_set_header   Connection        '';
        proxy_set_header   Cache-Control     no-cache;
        proxy_buffering    off;
        chunked_transfer_encoding on;
        proxy_read_timeout 3600s;   # keep SSE connections open up to 1 h
    }
}
