version: "3.9"

networks:
  fl-network:
    external: true   # Joins the network created by core/docker-compose.yml

services:
  client-1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fl-client-1
    volumes:
      - ../core/shared/model.py:/app/shared/model.py:ro
      - ./data/client-1:/data:ro
    env_file:
      - ../.env
    environment:
      - CLIENT_ID=client-1
      - CLIENT_DATA_PATH=/data/dataset.csv
    networks:
      - fl-network
    restart: on-failure

  client-2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fl-client-2
    volumes:
      - ../core/shared/model.py:/app/shared/model.py:ro
      - ./data/client-2:/data:ro
    env_file:
      - ../.env
    environment:
      - CLIENT_ID=client-2
      - CLIENT_DATA_PATH=/data/dataset.csv
    networks:
      - fl-network
    restart: on-failure

  client-3:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fl-client-3
    volumes:
      - ../core/shared/model.py:/app/shared/model.py:ro
      - ./data/client-3:/data:ro
    env_file:
      - ../.env
    environment:
      - CLIENT_ID=client-3
      - CLIENT_DATA_PATH=/data/dataset.csv
    networks:
      - fl-network
    restart: on-failure
